# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: pbi-syk-demo
description: >
  An Azure portfolio review agent that analyzes ACR, pipeline, and opportunity
  data from MSA_AzureConsumption_Enterprise via Power BI. Answers gap-to-target,
  conversion ranking, and recommended actions using pre-built DAX query tools.
metadata:
  authors:
    - Microsoft
  tags:
    - Azure AI AgentServer
    - Microsoft Agent Framework
    - Local Tools
    - Power BI
    - Portfolio Review
protocols:
  - protocol: responses
    version: v1
environment_variables:
  - name: PROJECT_ENDPOINT
    value: "{{PROJECT_ENDPOINT}}"
  - name: MODEL_DEPLOYMENT_NAME
    value: "{{MODEL_DEPLOYMENT_NAME}}"
  - name: SEMANTIC_MODEL_ID
    value: "{{SEMANTIC_MODEL_ID}}"
  - name: REPORT_ID
    value: "{{REPORT_ID}}"
  - name: AZURE_TENANT_ID
    value: "{{AZURE_TENANT_ID}}"